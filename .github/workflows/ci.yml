name: CI
on: [ push, pull_request]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc build-essential libc6-dev cppcheck
          cd tinycc && ./configure && make && sudo make install
          pip install prek

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install gcc
          cd tinycc && ./configure && make && sudo make install

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-gcc
            make

      - name: Build and install TinyCC (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cd tinycc
          ./configure
          make
          make install

      - name: Build
        run: make

      - name: Run tests
        if: matrix.os != 'macos-latest'
        run: make check

      - name: Run linter
        run: make lint

      - name: Run benchmarks
        if: matrix.os != 'macos-latest'
        run: make bench

      - name: Upload Windows reports
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-reports
          path: |
            bench/bench_report_mingw.md
            tcc_test_mingw.md

      - name: Make dist
        if: github.ref == 'refs/heads/main'
        run: make dist

      - name: Upload Windows dist
        if: matrix.os == 'windows-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rcc-windows
          path: |
            rcc-*.zip

      - if: startsWith(github.ref, 'refs/tags/') && github.ref == 'refs/heads/main'
        name: Release
        continue-on-error: true
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
              rcc-*.tar.gz
              rcc-*.tar.xz
              rcc-*.zip
